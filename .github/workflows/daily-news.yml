name: Daily Business News Fetcher

on:
  schedule:
    # 8:00 AM Eastern Time is 1:00 PM UTC. Adjust this number if you live elsewhere!
    - cron: '0 13 * * *'
  workflow_dispatch: # This adds a manual button so we can test it immediately!

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    特征- name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Fetch Script
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: python fetch_news.py

    - name: Commit and Push Updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add today_news.json
        git diff-index --quiet HEAD || (git commit -m "Daily news update" && git push)